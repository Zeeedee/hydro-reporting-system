<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    document.documentElement.classList.add('hydro-auth-pending');
  </script>
  <style>
    html.hydro-auth-pending body { opacity: 0 !important; }
  </style>
  <title>HYDRO - Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/css/theme.css">

      <link rel="stylesheet" href="/css/mobile-offcanvas.css">
    <link rel="stylesheet" href="/css/nav-consistency.css">
<style>
* {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--light);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-spinner-large {
      width: 50px;
      height: 50px;
      border: 4px solid var(--gray-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--primary);
      color: white;
      padding: 1.5rem 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .logo {
      padding: 0 1.5rem 2rem;
      font-size: 1.6rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo i {
      font-size: 1.8rem;
    }

    .nav-list {
      list-style: none;
      flex: 1;
    }

    .nav-item {
      padding: 0.95rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-item:hover,
    .nav-item.active {
      background: rgba(255, 255, 255, 0.12);
    }

    .nav-item i {
      width: 20px;
      text-align: center;
    }

    /* Main Content */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 1rem;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
.stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.9rem;
      margin-bottom: 1.75rem;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--gray-light);
      padding: 0.75rem 0.85rem;
      min-height: 86px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.15;
      margin: 0.15rem 0 0;
    }

    .stat-label {
      color: var(--gray);
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.25;
    }

    h2 {
      margin: 0 0 0.85rem;
      color: var(--primary-dark);
    }

    /* Table */
    .table-wrapper {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--gray-light);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      text-align: left;
    }

    thead {
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      font-weight: 600;
      color: #475569;
      font-size: 0.82rem;
      text-transform: none;
      letter-spacing: 0;
    }

    tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.13s;
    }

    tr:hover {
      background: #f8fafc;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 500;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-progress {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-resolved {
      background: #d1fae5;
      color: #065f46;
    }

    .empty-state {
      text-align: center;
      padding: 2.6rem 1.2rem;
      color: var(--gray);
    }

    .reports-warning-banner {
      display: none;
      margin-bottom: 1rem;
      border: 1px solid #fcd34d;
      background: #fffbeb;
      color: #92400e;
      border-radius: 10px;
      padding: 0.75rem 0.85rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .reports-warning-banner.is-visible {
      display: block;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
/* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal-card {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-header {
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
      color: var(--primary-dark);
      font-weight: 700;
    }

    .modal-subtitle {
      color: var(--gray);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text);
      font-size: 0.95rem;
    }

    .form-select,
    .form-input,
    .form-textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      background: #f8fafc;
      transition: border-color 0.15s;
    }

    .form-select:focus,
    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      background: white;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .file-input-wrapper {
      position: relative;
    }

    .file-input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .btn-file {
      border: 1px solid #cbd5e1;
      background: white;
      color: var(--gray);
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-file:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .file-name {
      margin-left: 10px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .risk-options {
      display: flex;
      gap: 15px;
      margin-top: 0.5rem;
    }

    .risk-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .risk-radio {
      accent-color: var(--primary);
      transform: scale(1.1);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 0.95rem;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: var(--text);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #fef2f2;
      color: var(--danger);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
      border: 1px solid #fecaca;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #d1fae5;
      color: #065f46;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
      border: 1px solid #a7f3d0;
    }

    .success-message.show {
      display: block;
    }

    .loading-spinner-small {
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>

<body>

  <!-- Loading overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay" aria-hidden="true">
    <div class="loading-spinner-large"></div>
  </div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-droplet"></i>
        HYDRO
      </div>

      <button type="button" class="submit-btn sidebar-submit-btn" data-open-submit-modal>
        <i class="fa-solid fa-plus"></i>
        Submit New Water Report
      </button>

            <ul class="nav-list">
        <li class="nav-item" data-nav-path="/index.html" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i> Dashboard</li>
        <li class="nav-item" data-nav-path="/MyRecords.html" onclick="location.href='MyRecords.html'"><i class="fa-solid fa-file-lines"></i> My Records</li>
        <li class="nav-item" data-nav-path="/notifications.html" onclick="location.href='notifications.html'"><i class="fa-solid fa-bell"></i> Announcements</li>
        <li class="nav-item" data-nav-path="/profile.html" onclick="location.href='profile.html'"><i class="fa-solid fa-user"></i> Profile</li>
        <li class="nav-item" data-nav-path="/faq.html" onclick="location.href='faq.html'"><i class="fa-solid fa-circle-question"></i> FAQ</li>
      </ul>

    </aside>

    <!-- Main Content -->
    <main class="main">

      <header>
        <h1>Dashboard</h1>
        <div class="user-info">
          <div class="avatar" id="userAvatar">--</div>
          <div>
            <div><strong id="userName">Loading...</strong></div>
            <div class="role-label">Student</div>
          </div>
          <button class="logout-btn" id="logoutBtn" title="Log out">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>
      </header>

      <div id="reportsWarningBanner" class="reports-warning-banner"></div>

      <!-- Stats Cards -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total Reports Submitted</div>
          <div class="stat-number" id="statTotal">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Reports</div>
          <div class="stat-number" style="color:var(--pending);" id="statPending">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In Progress</div>
          <div class="stat-number" style="color:var(--progress);" id="statInProgress">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Resolved Reports</div>
          <div class="stat-number" style="color:var(--resolved);" id="statResolved">-</div>
        </div>
      </div>

      <!-- Table -->
      <h2>Daily Reports <span class="text-sm text-muted">(Today)</span></h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Building</th>
              <th>Location</th>
              <th>Issue Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="dailyReportsTbody">
            <tr>
              <td colspan="5" class="empty-state">
                <p>Loading reports...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
</main>
  </div>

    <script type="module" src="/js/ui/mobile-layout-init.js"></script>
  <script type="module" src="/js/ui/activeNav.js"></script>
<script type="module" src="/js/student-init.js"></script>
      <script type="module" src="/js/student-dashboard-init.js"></script>


</body>

</html>
