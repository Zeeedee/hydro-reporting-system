<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        document.documentElement.classList.add('hydro-auth-pending');
    </script>
    <style>
        html.hydro-auth-pending body { opacity: 0 !important; }
    </style>
    <title>HYDRO Maintenance - Profile Settings</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css">

        <link rel="stylesheet" href="/css/mobile-offcanvas.css">
    <link rel="stylesheet" href="/css/nav-consistency.css">
<style>
* {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--light);
            min-height: 100vh;
            color: var(--text);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            font-size: 2rem;
            color: var(--cyan);
        }

        .sidebar-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .sidebar-subtitle {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.9rem 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.2s;
            gap: 12px;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-left: 3px solid var(--cyan);
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
        }

        .header {
            height: var(--header-height);
            background: white;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            overflow: hidden;
            flex-shrink: 0;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-meta {
            display: flex;
            flex-direction: column;
            min-width: 0;
            line-height: 1.1;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 700;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
.page-content {
            padding: 2rem;
            max-width: 800px;
        }

        .settings-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .settings-header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-body {
            padding: 2rem;
        }

        .profile-section {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .avatar-section {
            text-align: center;
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-light);
            margin-bottom: 0.8rem;
        }

        .btn-change-photo {
            padding: 0.5rem 1rem;
            background: var(--cyan);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-change-photo:hover {
            background: #0891b2;
        }

        .form-section {
            flex: 1;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 95, 122, 0.1);
        }

        .password-strength {
            margin-top: 0.5rem;
        }

        .strength-bar {
            height: 4px;
            background: var(--gray-light);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }

        .strength-fill.weak {
            width: 33%;
            background: var(--red);
        }

        .strength-fill.medium {
            width: 66%;
            background: var(--yellow);
        }

        .strength-fill.strong {
            width: 100%;
            background: var(--green);
        }

        .strength-text {
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 4px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-light);
        }

        .btn-discard {
            padding: 0.7rem 1.2rem;
            background: var(--gray-light);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-discard:hover {
            background: var(--gray);
            color: white;
        }

        .btn-save {
            padding: 0.7rem 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save:hover {
            background: var(--primary-dark);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gray-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-overlay.hidden {
            display: none;
        }

        .success-message {
            padding: 1rem;
            background: #d1fae5;
            color: #047857;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }

            .page-content {
                padding: 1rem;
            }

            .profile-section {
                flex-direction: column;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <div class="loading-overlay hidden" id="loadingOverlay" aria-hidden="true">
        <div class="loading-spinner"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-droplet sidebar-logo"></i>
            <div>
                <div class="sidebar-title">HYDRO</div>
                <div class="sidebar-subtitle">Maintenance Team</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
            <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i> Announcements</a>
            <a href="settings.html" class="nav-item active"><i class="fas fa-user-cog"></i> Profile Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="header-title">Profile Settings</h1>
            <div class="header-actions">
                <div class="user-profile">
                    <div class="user-avatar" id="headerUserAvatar">--</div>
                    <div class="user-meta">
                        <div class="user-name" id="headerUserName">Maintenance</div>
                        <div class="role-label" id="headerUserRole">Maintenance</div>
                    </div>
                </div>
                <button class="btn-logout" id="logoutBtn" title="Log out"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
        </header>

        <div class="page-content">
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i> Changes saved successfully!
            </div>

            <form id="settingsForm">
                <!-- Profile Section -->
                <div class="settings-card">
                    <div class="settings-header">
                        <i class="fas fa-user"></i> Profile Information
                    </div>
                    <div class="settings-body">
                        <div class="profile-section">
                            <div class="avatar-section">
                                <img src="../assets/default-avatar.svg" class="avatar-large" id="avatarImg"
                                    alt="Profile">
                                <br>
                                <button type="button" class="btn-change-photo" id="changePhotoBtn">
                                    <i class="fas fa-camera"></i> Change Photo
                                </button>
                                <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                            </div>

                            <div class="form-section">
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label class="form-label">Name</label>
                                        <input type="text" class="form-input" id="profileName"
                                            placeholder="Enter your name">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-input" id="profileEmail" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Phone Number</label>
                                        <input type="tel" class="form-input" id="profilePhone"
                                            placeholder="Enter phone number">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Security Section -->
                <div class="settings-card">
                    <div class="settings-header">
                        <i class="fas fa-lock"></i> Change Password
                    </div>
                    <div class="settings-body">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Current Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-input" id="currentPassword" autocomplete="current-password"
                                        placeholder="Enter current password">
                                    <button type="button" class="password-toggle" data-toggle="currentPassword" aria-label="Toggle password visibility" aria-pressed="false">
                                        <i class="fa-regular fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">New Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-input" id="newPassword" autocomplete="new-password" minlength="8" maxlength="16"
                                        placeholder="Enter new password">
                                    <button type="button" class="password-toggle" data-toggle="newPassword" aria-label="Toggle password visibility" aria-pressed="false">
                                        <i class="fa-regular fa-eye"></i>
                                    </button>
                                </div>
                                <div class="password-strength">
                                    <div class="strength-bar">
                                        <div class="strength-fill" id="strengthFill"></div>
                                    </div>
                                    <div class="strength-text" id="strengthText">Password Strength</div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirm Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-input" id="confirmPassword" autocomplete="new-password" minlength="8" maxlength="16"
                                        placeholder="Confirm new password">
                                    <button type="button" class="password-toggle" data-toggle="confirmPassword" aria-label="Toggle password visibility" aria-pressed="false">
                                        <i class="fa-regular fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-discard" id="discardBtn">Discard</button>
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>
            </form>
        </div>
    </main>

      <script type="module" src="/js/ui/mobile-layout-init.js"></script>
  <script type="module" src="/js/ui/activeNav.js"></script>
<script type="module">
        import { initMaintenanceAuthGuard, maintenanceLogout } from '../js/maintenance-auth.js';
        import { db, auth } from '../js/firebase-config.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';
        import { changePassword } from '../js/auth.js';
        import { validateRequired, validateLength, validatePhone, validatePassword, firstValidationError } from '../js/validation/validation.js';
        import { bindPasswordVisibilityToggles } from '../js/ui/password-toggle.js';
        import { handleRateLimitError } from '../js/shared/rate-limit-ui.js';
        import { showToast } from '../js/ui/notice.js';
        import { logError } from '../js/shared/logger.js';

        const functions = getFunctions(undefined, 'asia-southeast1');
        const storage = getStorage();
        let currentUser = null;
        let selectedImageFile = null;

        function getInitials(name) {
            if (!name) return 'M';
            const parts = String(name).trim().split(' ').filter(Boolean);
            if (!parts.length) return 'M';
            if (parts.length === 1) return parts[0][0].toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }

        function syncHeaderUser() {
            const displayName = currentUser?.name || currentUser?.email || 'Maintenance';
            const avatarUrl = currentUser?.avatarUrl || '';

            const nameEl = document.getElementById('headerUserName');
            const avatarEl = document.getElementById('headerUserAvatar');
            if (nameEl) nameEl.textContent = displayName;
            if (!avatarEl) return;

            if (avatarUrl) {
                avatarEl.innerHTML = `<img src="${avatarUrl}" alt="Profile" onerror="this.parentElement.textContent='${getInitials(displayName)}'; this.remove();">`;
            } else {
                avatarEl.textContent = getInitials(displayName);
            }
        }

        async function init() {
            try {
                currentUser = await initMaintenanceAuthGuard();
                populateForm();
                setupEventListeners();
                document.getElementById('loadingOverlay').classList.add('hidden');
            } catch (error) {
                logError('Init error:', error);
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function populateForm() {
            document.getElementById('profileName').value = currentUser.name || '';
            document.getElementById('profileEmail').value = currentUser.email || '';
            document.getElementById('profilePhone').value = currentUser.phone || '';

            if (currentUser.avatarUrl) {
                const img = document.getElementById('avatarImg');
                img.src = currentUser.avatarUrl;
                // Apply frontend enhancement for display
                enhanceImageDisplay(img);
            }
            syncHeaderUser();
        }

        /**
         * Frontend image enhancement for display
         * Applies subtle enhancements for better visual quality
         */
        function enhanceImageDisplay(imgElement) {
            imgElement.style.filter = 'contrast(1.02) saturate(1.05)';
            imgElement.style.imageRendering = 'crisp-edges';
        }

        /**
         * Compress image on client side before upload
         * Optimized for profile avatars - 400x400 max, 80% quality
         */
        async function compressImage(file, maxWidth = 400, quality = 0.8) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Calculate new dimensions
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob(resolve, 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        /**
         * Upload profile image to Firebase Storage
         * Overwrites existing image if present
         */
        async function uploadProfileImage(file) {
            const user = auth.currentUser;
            if (!user) throw new Error('Not authenticated');

            // Compress image before upload
            const compressedBlob = await compressImage(file);

            // Use a unique filename to avoid stale browser caches.
            const storageRef = ref(storage, `avatars/${user.uid}/avatar-${Date.now()}.jpg`);

            // Upload with metadata
            const metadata = {
                contentType: 'image/jpeg',
                customMetadata: {
                    uploadedAt: new Date().toISOString(),
                    originalName: file.name
                }
            };

            await uploadBytes(storageRef, compressedBlob, metadata);
            const downloadURL = await getDownloadURL(storageRef);

            return downloadURL;
        }

        function setupEventListeners() {
            // Password strength
            document.getElementById('newPassword').addEventListener('input', (e) => {
                const password = e.target.value;
                const fill = document.getElementById('strengthFill');
                const text = document.getElementById('strengthText');

                if (password.length === 0) {
                    fill.className = 'strength-fill';
                    text.textContent = 'Password Strength';
                } else if (password.length < 8 || password.length > 16) {
                    fill.className = 'strength-fill weak';
                    text.textContent = 'Weak';
                } else if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password) || !/[\W_]/.test(password)) {
                    fill.className = 'strength-fill medium';
                    text.textContent = 'Medium';
                } else {
                    fill.className = 'strength-fill strong';
                    text.textContent = 'Strong';
                }
            });

            bindPasswordVisibilityToggles();

            // Avatar upload - click to select
            document.getElementById('changePhotoBtn').addEventListener('click', () => {
                document.getElementById('avatarInput').click();
            });

            // Avatar file selection - preview and store
            document.getElementById('avatarInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    // Validate file type
                    if (!file.type.startsWith('image/')) {
                        showToast('Please choose an image file to upload.', { type: 'warning' });
                        return;
                    }

                    // Validate file size (max 5MB)
                    if (file.size > 5 * 1024 * 1024) {
                        showToast('Please choose an image under 5MB.', { type: 'warning' });
                        return;
                    }

                    selectedImageFile = file;

                    // Show preview
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.getElementById('avatarImg');
                        img.src = e.target.result;
                        enhanceImageDisplay(img);
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Discard - reset form and clear selected image
            document.getElementById('discardBtn').addEventListener('click', () => {
                selectedImageFile = null;
                populateForm();
            });

            // Save - includes image upload
            document.getElementById('settingsForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const saveBtn = e.target.querySelector('.btn-save');
                const originalText = saveBtn ? saveBtn.textContent : '';
                if (saveBtn) {
                    saveBtn.disabled = true;
                    saveBtn.textContent = 'Saving...';
                }

                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const currentPassword = document.getElementById('currentPassword').value;
                const nameValue = document.getElementById('profileName').value;
                const phoneValue = document.getElementById('profilePhone').value;

                const validationError = firstValidationError([
                    validateRequired(nameValue, 'Name'),
                    validateLength(nameValue, { min: 2, max: 120, label: 'Name' }),
                    validatePhone(phoneValue, { required: false }),
                ]);
                if (validationError) {
                    showToast(validationError, { type: 'warning' });
                    if (saveBtn) {
                        saveBtn.disabled = false;
                        saveBtn.textContent = originalText;
                    }
                    return;
                }

                const passwordChangeRequested = Boolean(String(currentPassword || '').trim() || String(newPassword || '').trim() || String(confirmPassword || '').trim());

                if (passwordChangeRequested) {
                    if (!String(currentPassword || '').trim()) {
                        showToast('Enter your current password to update it.', { type: 'warning' });
                        if (saveBtn) {
                            saveBtn.disabled = false;
                            saveBtn.textContent = originalText;
                        }
                        return;
                    }

                    if (!String(newPassword || '').trim()) {
                        showToast('Enter a new password.', { type: 'warning' });
                        if (saveBtn) {
                            saveBtn.disabled = false;
                            saveBtn.textContent = originalText;
                        }
                        return;
                    }

                    if (newPassword !== confirmPassword) {
                        showToast('Passwords do not match. Please re-enter them.', { type: 'warning' });
                        if (saveBtn) {
                            saveBtn.disabled = false;
                            saveBtn.textContent = originalText;
                        }
                        return;
                    }

                    const passwordCheck = validatePassword(newPassword);
                    if (!passwordCheck.valid) {
                        showToast(passwordCheck.errors[0] || 'Please choose a stronger password.', { type: 'warning' });
                        if (saveBtn) {
                            saveBtn.disabled = false;
                            saveBtn.textContent = originalText;
                        }
                        return;
                    }
                }

                try {
                    let avatarUrl = currentUser.avatarUrl;

                    // Upload new image if selected
                    if (selectedImageFile) {
                        avatarUrl = await uploadProfileImage(selectedImageFile);
                        // Successful upload; continue saving.
                    }

                    // Update profile via Cloud Function
                    const updateUserProfile = httpsCallable(functions, 'updateUserProfile');
                    await updateUserProfile({
                        name: document.getElementById('profileName').value,
                        phone: document.getElementById('profilePhone').value,
                        avatarUrl: avatarUrl
                    });

                    // Update password if provided
                    if (passwordChangeRequested) {
                        const result = await changePassword(currentPassword, newPassword);
                        if (!result.success) {
                            throw new Error(result.error || 'Failed to change password');
                        }

                        document.getElementById('currentPassword').value = '';
                        document.getElementById('newPassword').value = '';
                        document.getElementById('confirmPassword').value = '';
                        document.getElementById('strengthFill').className = 'strength-fill';
                        document.getElementById('strengthText').textContent = 'Password Strength';
                    }

                    // Clear selected file
                    selectedImageFile = null;
                    document.getElementById('avatarInput').value = '';

                    // Update current user data
                    currentUser.name = document.getElementById('profileName').value;
                    currentUser.phone = document.getElementById('profilePhone').value;
                    if (avatarUrl) currentUser.avatarUrl = avatarUrl;
                    syncHeaderUser();

                    document.getElementById('successMessage').classList.add('show');
                    setTimeout(() => {
                        document.getElementById('successMessage').classList.remove('show');
                    }, 3000);

                } catch (error) {
                    logError('Save error:', error);
                    if (handleRateLimitError(error)) {
                        return;
                    }
                    showToast('Could not save changes. Please try again.', { type: 'error' });
                } finally {
                    if (saveBtn) {
                        saveBtn.disabled = false;
                        saveBtn.textContent = originalText;
                    }
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', maintenanceLogout);
        }

        init();
    </script>
</body>

</html>
