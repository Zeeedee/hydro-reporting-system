<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    document.documentElement.classList.add('hydro-auth-pending');
  </script>
  <style>
    html.hydro-auth-pending body { opacity: 0 !important; }
  </style>
  <title>HYDRO - Announcements</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/css/theme.css">

      <link rel="stylesheet" href="/css/mobile-offcanvas.css">
    <link rel="stylesheet" href="/css/nav-consistency.css">
<style>
* {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--light);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-spinner-large {
      width: 50px;
      height: 50px;
      border: 4px solid var(--gray-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--primary);
      color: white;
      padding: 1.5rem 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .logo {
      padding: 0 1.5rem 2rem;
      font-size: 1.6rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo i {
      font-size: 1.8rem;
    }

    .nav-list {
      list-style: none;
      flex: 1;
    }

    .nav-item {
      padding: 0.95rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-item:hover,
    .nav-item.active {
      background: rgba(255, 255, 255, 0.12);
    }

    .nav-item i {
      width: 20px;
      text-align: center;
    }
.main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
h2 {
      margin: 2rem 0 1rem;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .notification-section {
      margin-bottom: 2rem;
    }

    .notification-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .notification-card {
      background: white;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--primary);
      transition: transform 0.15s;
    }

    .notification-card:hover {
      transform: translateY(-3px);
    }

    .notification-card.urgent {
      border-left-color: var(--danger);
      background: #fef2f2;
    }

    .notification-card.planned {
      border-left-color: var(--info);
    }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .notification-title {
      font-weight: 600;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notification-title i {
      color: var(--danger);
    }

    .notification-time {
      font-size: 0.82rem;
      color: var(--gray);
    }

    .notification-desc {
      color: #475569;
      line-height: 1.5;
    }

    .notification-status {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 4px;
      margin-left: 8px;
    }

    .notification-status.active {
      background: #dcfce7;
      color: #16a34a;
    }

    .notification-status.expired {
      background: #fef2f2;
      color: #dc2626;
    }

    .notification-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .notification-list::-webkit-scrollbar {
      width: 6px;
    }

    .notification-list::-webkit-scrollbar-track {
      background: var(--gray-light);
      border-radius: 3px;
    }

    .notification-list::-webkit-scrollbar-thumb {
      background: var(--gray);
      border-radius: 3px;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--gray);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--gray);
      margin-top: 0.5rem;
    }

    .connection-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    .connection-status .dot.offline {
      background: #ef4444;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .notifications-warning-banner {
      display: none;
      margin-bottom: 1rem;
      border: 1px solid #fcd34d;
      background: #fffbeb;
      color: #92400e;
      border-radius: 10px;
      padding: 0.75rem 0.85rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .notifications-warning-banner.is-visible {
      display: block;
    }
  </style>
</head>

<body>

  <div class="loading-overlay hidden" id="loadingOverlay" aria-hidden="true">
    <div class="loading-spinner-large"></div>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-droplet"></i>
        HYDRO
      </div>

      <button type="button" class="submit-btn sidebar-submit-btn" data-open-submit-modal>
        <i class="fa-solid fa-plus"></i>
        Submit New Water Report
      </button>

            <ul class="nav-list">
        <li class="nav-item" data-nav-path="/index.html" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i> Dashboard</li>
        <li class="nav-item" data-nav-path="/MyRecords.html" onclick="location.href='MyRecords.html'"><i class="fa-solid fa-file-lines"></i> My Records</li>
        <li class="nav-item" data-nav-path="/notifications.html" onclick="location.href='notifications.html'"><i class="fa-solid fa-bell"></i> Announcements</li>
        <li class="nav-item" data-nav-path="/profile.html" onclick="location.href='profile.html'"><i class="fa-solid fa-user"></i> Profile</li>
        <li class="nav-item" data-nav-path="/faq.html" onclick="location.href='faq.html'"><i class="fa-solid fa-circle-question"></i> FAQ</li>
      </ul>

    </aside>

    <main class="main">

      <header>
        <h1>Announcements</h1>
        <div class="user-info">
          <div class="avatar" id="userAvatar">--</div>
          <div>
            <div><strong id="userName">Loading...</strong></div>
            <div class="role-label">Student</div>
          </div>
          <button class="logout-btn" id="logoutBtn" title="Log out">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>
      </header>

      <div id="notificationsWarningBanner" class="notifications-warning-banner"></div>

      <div class="notification-section">
        <div class="section-header">
          <h2><i class="fa-solid fa-bullhorn" style="color:var(--info);"></i> Announcements</h2>
          <div class="connection-status" id="announcementsStatus">
            <span class="dot"></span>
            <span>Loaded</span>
          </div>
        </div>
        <div class="notification-list" id="announcementsList">
          <div class="empty-state">
            <p>Loading announcements...</p>
          </div>
        </div>
      </div>

    </main>
  </div>

    <script type="module" src="/js/ui/mobile-layout-init.js"></script>
  <script type="module" src="/js/ui/activeNav.js"></script>
<script type="module" src="/js/student-init.js"></script>
  <script type="module" src="/js/notifications.js"></script>
  <script type="module" src="/js/notifications-page-init.js"></script>

</body>

</html>
