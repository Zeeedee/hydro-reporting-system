<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>HYDRO Admin - MFA Challenge</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1100px 740px at 20% 10%, rgba(26, 95, 122, 0.12), transparent 52%),
        radial-gradient(840px 520px at 78% 20%, rgba(49, 200, 168, 0.14), transparent 56%),
        var(--light);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .head {
      padding: 20px 22px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .head i { color: rgba(255, 255, 255, 0.92); }
    .head h1 { margin: 0; font-size: 1.05rem; color: #ffffff; }

    .body {
      padding: 20px 22px 22px;
    }

    .muted { color: #475569; margin: 0 0 14px; line-height: 1.5; }

    .field label {
      display: block;
      font-weight: 800;
      margin-bottom: 6px;
      color: #0f172a;
      font-size: 0.92rem;
    }

      .field input {
        width: 100%;
        border: 1px solid rgba(15, 23, 42, 0.14);
        border-radius: 12px;
        padding: 12px 10px;
        font-size: clamp(1.05rem, 4.6vw, 1.35rem);
        outline: none;
        letter-spacing: clamp(0.12em, 1.1vw, 0.22em);
        text-align: center;
        font-variant-numeric: tabular-nums;
      }

      .field input::placeholder {
        color: #94a3b8;
        letter-spacing: 0.12em;
      }

     .help {
       margin-top: 8px;
       color: #64748b;
       font-size: 0.85rem;
       line-height: 1.35;
     }

    .actions {
      display: grid;
      grid-template-columns: 1fr minmax(120px, 160px);
      gap: 10px;
      margin-top: 14px;
    }

    .actions .btn {
      width: 100%;
      justify-content: center;
    }

    @media (max-width: 560px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: rgba(15, 23, 42, 0.06); color: #0f172a; }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(15, 23, 42, 0.03);
      color: #0f172a;
      display: none;
      line-height: 1.45;
    }

    .message.show { display: block; }
    .message.error { background: rgba(220, 38, 38, 0.08); color: #991b1b; border-color: rgba(220, 38, 38, 0.18); }
    .message.info { background: rgba(26, 95, 122, 0.08); color: #0b4f67; border-color: rgba(26, 95, 122, 0.18); }

    .hidden { display: none !important; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="head">
      <i class="fa-solid fa-lock"></i>
      <h1>MFA Required</h1>
    </div>
    <div class="body">
      <p class="muted" id="subtitle">Enter the 6-digit code from your authenticator app to continue.</p>

       <div class="field">
         <label for="otp">Authenticator code</label>
         <input id="otp" type="text" inputmode="numeric" autocomplete="one-time-code" enterkeyhint="done" placeholder="123456" maxlength="6" aria-describedby="otpHelp" />
         <div class="help" id="otpHelp">Use the 6-digit code in your authenticator app.</div>
       </div>

      <div class="field hidden" id="passwordField" style="margin-top:12px;">
        <label for="password">Password (only if requested)</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Enter your password" />
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="button" id="verifyBtn"><i class="fa-solid fa-circle-check"></i>Verify</button>
        <button class="btn btn-secondary" type="button" id="backBtn"><i class="fa-solid fa-arrow-left"></i>Back</button>
      </div>

      <div class="message" id="messageBox"></div>
    </div>
  </div>

  <script type="module" src="/js/admin-mfa-challenge.js"></script>
</body>

</html>
